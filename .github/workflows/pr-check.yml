name: PR Quality Gate

# This workflow runs on every PR and must pass before merging
# Configure branch protection to require this check

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '22'

# Cancel in-progress runs for the same PR
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Quality Gate - ALL MUST PASS TO MERGE
  # ============================================

  lint:
    name: ✅ Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run lint

  build:
    name: ✅ Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}

      - name: Upload build for tests
        uses: actions/upload-artifact@v4
        with:
          name: pr-build-${{ github.event.pull_request.number }}
          path: dist/
          retention-days: 3

  security:
    name: ✅ Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Security audit
        run: |
          npm audit --json > audit.json || true
          CRITICAL=$(cat audit.json | jq '.metadata.vulnerabilities.critical // 0')
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::❌ Critical vulnerabilities found!"
            cat audit.json | jq '.vulnerabilities | to_entries[] | select(.value.severity == "critical") | .key'
            exit 1
          fi
          echo "✅ No critical vulnerabilities"

  unit-tests:
    name: ✅ Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Run unit tests
        run: npm run test:run
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # ============================================
  # E2E Regression Tests
  # ============================================
  e2e-tests:
    name: ✅ E2E Regression Tests
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: pr-build-${{ github.event.pull_request.number }}
          path: dist/

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event.pull_request.number }}
          path: playwright-report/
          retention-days: 7

  # ============================================
  # Summary Check - Reports overall status
  # ============================================
  quality-gate:
    name: 🚦 Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, build, security, unit-tests, e2e-tests]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          echo "## PR Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FAILED=false

          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ Lint failed" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "✅ Lint passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Build failed" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "✅ Build passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.security.result }}" != "success" ]; then
            echo "❌ Security check failed" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "✅ Security passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "❌ Unit tests failed" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "✅ Unit tests passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.e2e-tests.result }}" != "success" ]; then
            echo "❌ E2E regression tests failed" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "✅ E2E regression tests passed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$FAILED" = "true" ]; then
            echo "### ❌ Quality Gate Failed" >> $GITHUB_STEP_SUMMARY
            echo "Please fix the issues above before merging." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "### ✅ Quality Gate Passed" >> $GITHUB_STEP_SUMMARY
            echo "All checks passed! This PR is ready to merge." >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================
  # Preview Deployment
  # ============================================
  preview:
    name: 🔗 Deploy Preview
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: pr-build-${{ github.event.pull_request.number }}
          path: dist/

      - name: Deploy preview
        uses: nwtgck/actions-netlify@v3.0
        id: netlify
        with:
          publish-dir: './dist'
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
          alias: pr-${{ github.event.pull_request.number }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
