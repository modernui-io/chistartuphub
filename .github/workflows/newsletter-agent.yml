name: Capital Access Research Agent

on:
  # Thursday at 7 PM UTC = 1 PM CT + Saturday at 7 PM UTC = 1 PM CT
  schedule:
    - cron: '0 19 * * 4'
    - cron: '0 19 * * 6'

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      days:
        description: 'Days to look back for deals'
        required: false
        default: '7'
      volume:
        description: 'Override volume number'
        required: false
      dry_run:
        description: 'Dry run (no file writes)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  research:
    name: Run Research Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run newsletter agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          NOTIFICATION_EMAIL: billyndizeye@gmail.com
          # Pipeline: Perplexity Deep Research (deals/funds) + Sonar (opps) → Tavily+OpenAI (fallback)
          # No OLLAMA_URL in cloud — Ollama is local-only fallback
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.days }}" != "" ]; then
            ARGS="$ARGS --days ${{ github.event.inputs.days }}"
          fi
          if [ "${{ github.event.inputs.volume }}" != "" ]; then
            ARGS="$ARGS --volume ${{ github.event.inputs.volume }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node scripts/newsletter-agent.mjs $ARGS

      - name: Commit and push newsletter files
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "Capital Access Agent"
          git config user.email "agent@chistartuphub.com"
          git add docs/newsletters/
          if git diff --staged --quiet; then
            echo "No new newsletter files to commit"
          else
            git commit -m "research: Capital Access $(date +%Y-W%V) automated research

            Generated by Capital Access Research Agent.
            Review 01-Rough.md and fill [PLACEHOLDER] sections."
            git push
          fi

      - name: Upload research artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-research-${{ github.run_number }}
          path: docs/newsletters/
          retention-days: 30
